name: Deploy Subscriber API

on:
  push:
    branches: [main, master]
    paths:
      - 'worker/**'
      - 'migrations/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-subscriber-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  secrets: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Cloudflare API token
        id: cf_auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_OAUTH_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_OAUTH_REFRESH_TOKEN }}
        run: |
          if [[ -n "${CLOUDFLARE_OAUTH_REFRESH_TOKEN}" ]]; then
            response="$(curl -sS -X POST "https://dash.cloudflare.com/oauth2/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=refresh_token" \
              --data-urlencode "refresh_token=${CLOUDFLARE_OAUTH_REFRESH_TOKEN}" \
              --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")"
            api_token="$(python3 - <<'PY' "$response"
          import json, sys
          print(json.loads(sys.argv[1]).get("access_token") or "")
          PY
          )"
            refresh_token="$(python3 - <<'PY' "$response"
          import json, sys
          print(json.loads(sys.argv[1]).get("refresh_token") or "")
          PY
          )"
            if [[ -z "$api_token" ]]; then
              echo "Failed to refresh Cloudflare OAuth token" >&2
              echo "$response" >&2
              exit 1
            fi
            echo "api_token=$api_token" >> "$GITHUB_OUTPUT"
            echo "refresh_token=$refresh_token" >> "$GITHUB_OUTPUT"
            echo "source=oauth_refresh" >> "$GITHUB_OUTPUT"
          elif [[ -n "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "api_token=${CLOUDFLARE_API_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "source=api_token" >> "$GITHUB_OUTPUT"
          else
            echo "Set CLOUDFLARE_OAUTH_REFRESH_TOKEN or CLOUDFLARE_API_TOKEN." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply subscribers --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_auth.outputs.api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.cf_auth.outputs.api_token }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Rotate OAuth refresh token secret
        if: steps.cf_auth.outputs.source == 'oauth_refresh' && steps.cf_auth.outputs.refresh_token != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh secret set CLOUDFLARE_OAUTH_REFRESH_TOKEN \
            --repo "${{ github.repository }}" \
            --body "${{ steps.cf_auth.outputs.refresh_token }}"
